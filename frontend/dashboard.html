<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>
Neo Ledger Dashboard
</title>

<link rel="stylesheet"
href="assets/css/style.css">

</head>

<body>

<div class="dashboard">

<h1>Neo Ledger Dashboard</h1>

<div class="cards">

<div class="card">

<h3>Balance</h3>

<p id="balance">
₹0
</p>

</div>

<div class="card">

<h3>Income</h3>

<p id="income">
₹0
</p>

</div>

<div class="card">

<h3>Expense</h3>

<p id="expense">
₹0
</p>

</div>

</div>

<div class="card">

    <h2>User Profile</h2>

    <p>
        <strong>Name:</strong>
        <span id="profileName"></span>
    </p>

    <p>
        <strong>Email:</strong>
        <span id="profileEmail"></span>
    </p>

    <p>
        <strong>Role:</strong>
        <span id="profileRole"></span>
    </p>

    <p>
        <strong>Account:</strong>
        <span id="profileAccount"></span>
    </p>

</div>

<h2>
Transfer Money
</h2>

<input
id="toAccount"
placeholder="Receiver Account Number">

<input
id="amount"
type="number"
placeholder="Transfer Amount">

<input
id="transferOtp"
placeholder="Enter OTP">

<button onclick="sendTransferOtp()">
Send OTP
</button>

<button onclick="verifyAndTransfer()">
Transfer Money
</button>

<!--<button onclick="transfer()">
💸 Transfer Money
</button>-->

</div>

<div class="card">

<h2>
Transaction History
</h2>

<ul id="txnList">

</ul>

</div>

<div class="navbar">

    <h4 id="welcomeUser">
        Welcome
    </h4>

    <div>

        <button
            id="adminBtn"
            onclick="openAdmin()">
            Admin Panel
        </button>

		<button
		    id="logoutBtn"
		    onclick="logout()">
		    Logout
		</button>

    </div>

</div>
